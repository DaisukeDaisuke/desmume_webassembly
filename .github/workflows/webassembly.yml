name: Build DeSmuME WebAssembly and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: ["main", "webassembly"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          
      - name: Install JavaScript dependencies
        run: |
          npm ci

      - name: Test and verify first-party JavaScript
        run: |
          npm test
          npm run check:js
          npm run check:licenses

      - name: Regenerate source-derived artifacts
        run: |
          npm run build:notices
          npm run build:js
          git diff --check
          git diff --exit-code -- public/app.js public/THIRD_PARTY_NOTICES.txt

      - name: Install Emscripten
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y emscripten > /dev/null 2>&1

      - name: Build WebAssembly
        env:
          OUTPUT_DIR: ${{ github.workspace }}/public
        run: |
          bash webassembly/build.sh

      - name: Minify Emscripten JavaScript
        run: |
          npx terser public/desmume.js -o public/desmume.js --compress --mangle

      - name: Verify Pages output
        run: |
          test -f public/index.html
          test -f public/app.js
          test -f public/coi-serviceworker.js
          test -f public/desmume.js
          test ! -d public/src
          test ! -f public/app.js.map
          grep -q "coi-serviceworker v0.1.7" public/coi-serviceworker.js

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
