name: Build DeSmuME WebAssembly and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: ["main", "webassembly"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Emscripten
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y emscripten > /dev/null 2>&1

      - name: Get Emscripten cache path
        id: em-cache-path
        run: echo "path=$(em-config CACHE)" >> $GITHUB_OUTPUT

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5
        id: em-cache
        with:
          path: ${{ steps.em-cache-path.outputs.path }}
          key: emscripten-cache-${{ runner.os }}-${{ hashFiles('/usr/share/emscripten/emscripten-version.txt', '/usr/lib/emscripten/emscripten-version.txt') }}
          restore-keys: |
            emscripten-cache-${{ runner.os }}-

      - name: Warm up Emscripten cache
        if: steps.em-cache.outputs.cache-hit != 'true'
        run: embuilder build MINIMAL

      - name: Build WebAssembly
        env:
          OUTPUT_DIR: ${{ github.workspace }}/public
        run: |
          bash webassembly/build.sh

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5